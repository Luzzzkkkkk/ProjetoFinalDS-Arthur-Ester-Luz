<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Gasther Colluz</title>
</head>
<body>

<h1>Painel do Administrador</h1>

<h2>Adicionar Aluno</h2>

<input type="text" id="nomeAluno" placeholder="Nome do aluno">

<select id="turmaAluno">
    <option value="1A">1A</option>
    <option value="1B">1B</option>
    <option value="2A">2A</option>
    <option value="2B">2B</option>
    <option value="3A">3A</option>
    <option value="3B">3B</option>
</select>

<button onclick="adicionarAluno()">Adicionar Aluno</button>

<hr>

<h2>Adicionar Professor</h2>

<input type="text" id="nomeProfessor" placeholder="Nome do professor">

<select id="turmaProfessor">
    <option value="1A">1A</option>
    <option value="1B">1B</option>
    <option value="2A">2A</option>
    <option value="2B">2B</option>
    <option value="3A">3A</option>
    <option value="3B">3B</option>
</select>

<button onclick="adicionarProfessor()">Adicionar Professor</button>

<hr>

<h2>Alunos</h2>
<div id="listaAlunos"></div>

<hr>

<h2>Professores</h2>
<div id="listaProfessores"></div>

<script>

function adicionarAluno() {

    let nome = document.getElementById("nomeAluno").value;
    let turma = document.getElementById("turmaAluno").value;

    if(nome === "") {
        alert("Digite o nome do aluno!");
        return;
    }

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    alunos.push({
        nome: nome,
        turma: turma,
        nota: 0
    });

    localStorage.setItem("alunos", JSON.stringify(alunos));

    atualizar();
}

function adicionarProfessor() {

    let nome = document.getElementById("nomeProfessor").value;
    let turma = document.getElementById("turmaProfessor").value;

    if(nome === "") {
        alert("Digite o nome do professor!");
        return;
    }

    let professores = JSON.parse(localStorage.getItem("professores")) || [];

    professores.push({
        nome: nome,
        turma: turma
    });

    localStorage.setItem("professores", JSON.stringify(professores));

    atualizar();
}

function excluirAluno(indice) {

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    alunos.splice(indice, 1);

    localStorage.setItem("alunos", JSON.stringify(alunos));

    atualizar();
}

function excluirProfessor(indice) {

    let professores = JSON.parse(localStorage.getItem("professores")) || [];

    professores.splice(indice, 1);

    localStorage.setItem("professores", JSON.stringify(professores));

    atualizar();
}

function atualizar() {

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];
    let professores = JSON.parse(localStorage.getItem("professores")) || [];

    let htmlAlunos = "";

    alunos.forEach((aluno, i) => {
        htmlAlunos += `
            <p>
                ${aluno.nome} - Turma ${aluno.turma}
                <button onclick="excluirAluno(${i})">Excluir</button>
            </p>
        `;
    });

    document.getElementById("listaAlunos").innerHTML = htmlAlunos;

    let htmlProfessores = "";

    professores.forEach((professor, i) => {
        htmlProfessores += `
            <p>
                ${professor.nome} - Turma ${professor.turma}
                <button onclick="excluirProfessor(${i})">Excluir</button>
            </p>
        `;
    });

    document.getElementById("listaProfessores").innerHTML = htmlProfessores;
}

atualizar();

</script>

</body>
</html>
