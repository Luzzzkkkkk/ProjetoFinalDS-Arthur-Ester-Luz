    <main>
        <h2>Área do Aluno</h2>
        
        <form>
            <!-- Campo Nome -->
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br><br>

            <!-- Campo Matrícula -->
            <label for="matricula">Matrícula:</label><br>
            <input type="number" id="matricula" name="matricula" placeholder="Digite sua matrícula"><br><br>

            <!-- Campo Senha -->
            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha"><br><br>

            <!-- Botão de Enviar -->
            <button type="submit">Entrar</button>
        </form>
    </main>
