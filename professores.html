            <header>
                 <nav class="abas">
            <button class="aba active" onclick="navegarPara('inicio', event)">Inicio</button>
             <button class="aba" onclick="navegarPara('turmas', event)">Turmas</button>
              <button class="aba" onclick="navegarPara('atividades', event)">Atividades</button>
               <button class="aba" onclick="navegarPara('calma', event)">mandamentos</button>

            <main>
             <section id="inicio" class="conteudo-pagina active">
             <h2>A</h2>

            <footer>

            </footer>
        <script>
            function navegarPara(idPagina, event) {
    // 1. Remove o active de todos os botões das abas
    const abas = document.querySelectorAll('.aba');
    abas.forEach(aba => aba.classList.remove('active'));
       
    // 2. Remove o active de todas as seções de conteúdo
    const paginas = document.querySelectorAll('.conteudo-pagina');
    paginas.forEach(pagina => pagina.classList.remove('active'));
 
    // 3. Adiciona active no botão que você clicou
    event.currentTarget.classList.add('active');
   
    // 4. Mostra a página correta
    document.getElementById(idPagina).classList.add('active');
}
        </script>
        
        </body>
