<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor</title>
<link rel="stylesheet" href="sonicface.css">
</head>

<body>

<div class="decoracao circulo c1"></div>
<div class="decoracao circulo c2"></div>
<div class="decoracao circulo c3"></div>
<div class="decoracao circulo c4"></div>
<div class="decoracao circulo c5"></div>
<div class="decoracao anel a1"></div>
<div class="decoracao anel a2"></div>
<div class="decoracao anel a3"></div>
<div class="decoracao bolinhas b1"></div>
<div class="decoracao bolinhas b2"></div>
<div class="decoracao bolinhas b3"></div>
<div class="decoracao bolinhas b4"></div>
<div class="decoracao bolinhas b5"></div>
<div class="decoracao linhas l1"></div>
<div class="decoracao linhas l2"></div>
<div class="decoracao linhas l3"></div>
<div class="decoracao linhas l4"></div>

<header>
    <h1>Gasther Colluz</h1>
    <h2 id="horario">Carregando</h2>
    <h2>Professor</h2>

    <nav>

    </nav>
</header>

<main>

<section>

<h2>Selecionar Turma</h2>

<select id="turma" onchange="mostrarAlunos()">
    <option value="">Escolha uma turma</option>
    <option value="1A">1A</option>
    <option value="1B">1B</option>
    <option value="2A">2A</option>
    <option value="2B">2B</option>
    <option value="3A">3A</option>
    <option value="3B">3B</option>
</select>

<br><br>

<div id="listaAlunos">
    Selecione uma turma.
</div>

</section>

</main>

<footer>

</footer>

<script>

const hora = new Date().getHours();
let textohorario = "";

if (hora >= 5 && hora < 12) {
    textohorario = "BOM DIA 😊☀️";
} else if (hora >= 12 && hora < 18) {
    textohorario = "BOA TARDE 😁🌆";
} else {
    textohorario = "BOA NOITE 😉🌃";
}

document.getElementById("horario").innerText = textohorario;

function mostrarAlunos() {

    let turma = document.getElementById("turma").value;

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    let html = "";

    alunos.forEach((aluno, indice) => {

        if(aluno.turma === turma){

            html += `
                <div>

                    <h3>${aluno.nome}</h3>

                    <p>Turma: ${aluno.turma}</p>

                    <label>Nota:</label>

                    <input
                    type="number"
                    min="0"
                    max="10"
                    value="${aluno.nota}"
                    onchange="alterarNota(${indice}, this.value)">

                    <hr>

                </div>
            `;
        }
    });

    if(html === ""){
        html = "<p>Nenhum aluno encontrado nesta turma.</p>";
    }

    document.getElementById("listaAlunos").innerHTML = html;
}

function alterarNota(indice, nota){

    let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

    alunos[indice].nota = Number(nota);

    localStorage.setItem("alunos", JSON.stringify(alunos));
}

</script>

</body>
</html>
